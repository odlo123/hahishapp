<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 1. Open Graph Meta Tags for beautiful share cards -->
  <meta property="og:title" content="Check out this Shop on HahishApp!" />
  <meta property="og:description" content="Discover items and buy directly from your mobile device." />
  <!-- Replace this with a real link to your app logo or shop placeholder image -->
  <meta property="og:image" content="https://raw.githubusercontent.com/your-username/hahishapp-links/main/preview.jpg" />
  <meta property="og:type" content="website" />

  <title>Redirecting to HahishApp...</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f7;
      color: #333;
      text-align: center;
    }
    .container { padding: 20px; }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007aff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script>
    window.onload = function() {
      // Extract the 'shopId' parameter from the URL (e.g., ?shopId=123)
      const urlParams = new URLSearchParams(window.location.search);
      const shopId = urlParams.get('shopId') || '';

      const userAgent = navigator.userAgent || navigator.vendor || window.opera;

      // 2. Try to force-open your native app using your custom scheme
      // It uses the scheme 'hahishapp://' configured in your Expo app
      window.location.replace(`hahishapp://shop/${shopId}`);

      // 3. Fallback mechanism: If the app isn't installed, 
      // the scheme fails silently and this timer executes after 1.5 seconds.
      setTimeout(() => {
        if (/android/i.test(userAgent)) {
          // Replace with your real Play Store Package ID when published
          window.location.replace("https://play.google.com/store/apps/details?id=com.yourcompany.hahishapp");
        } else if (/iPad|iPhone|iPod/.test(userAgent)) {
          // Replace with your real App Store Link when published
          window.location.replace("https://apps.apple.com/app/your-app-id");
        } else {
          // If clicked on a desktop computer browser
          document.getElementById("status").innerHTML = "<h3>Please scan or open this link on your phone to view this shop!</h3>";
        }
      }, 1500);
    };
  </script>
</head>
<body>
  <div class="container">
    <div class="loader"></div>
    <p id="status">Opening HahishApp...</p>
  </div>
</body>
</html>
